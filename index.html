<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Commercialista AI v5 · Nicholas Rossetti</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#03050a;color:#e2e8f0;font-family:'Syne',system-ui,sans-serif;font-size:20px}
:root{
  --g:#34d399;--gd:rgba(52,211,153,.12);--gb:rgba(52,211,153,.2);
  --r:#f87171;--a:#f59e0b;--b:#60a5fa;--p:#a78bfa;
  --bg:#03050a;--bg2:#0a0f1e;--bg3:#0f172a;--bg4:#1e293b;
  --txt:#e2e8f0;--mut:#64748b;--sub:#94a3b8;
  --mono:'JetBrains Mono',monospace;
}
input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
input[type=number]{-moz-appearance:textfield}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--gb);border-radius:4px}
::-webkit-scrollbar-track{background:transparent}
.app{display:flex;height:100vh;overflow:hidden;position:relative;z-index:1}
.bg-grid{position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(rgba(52,211,153,.02) 1px,transparent 1px),
  linear-gradient(90deg,rgba(52,211,153,.02) 1px,transparent 1px);
  background-size:44px 44px}
/* SIDEBAR */
.sb{width:210px;flex-shrink:0;background:var(--bg2);border-right:1px solid rgba(52,211,153,.1);
  display:flex;flex-direction:column;overflow:hidden}
.sb-head{padding:18px 14px 10px;border-bottom:1px solid rgba(52,211,153,.07)}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:34px;height:34px;background:linear-gradient(135deg,var(--g),#059669);
  border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-size:16px;flex-shrink:0;box-shadow:0 0 16px rgba(52,211,153,.25)}
.logo-t{font-size:12px;font-weight:800;color:#f1f5f9}
.logo-s{font-size:9px;color:var(--mut);margin-top:1px}
.yrs-list{flex:1;overflow-y:auto;padding:8px 6px}
.yr-lbl{font-size:9px;color:var(--mut);letter-spacing:1.5px;text-transform:uppercase;padding:6px 6px 4px;font-weight:700}
.yr-item{display:flex;align-items:center;gap:6px;padding:9px 10px;border-radius:9px;
  cursor:pointer;margin-bottom:3px;border:1px solid transparent;transition:.15s}
.yr-item:hover{background:var(--gd)}
.yr-item.act{background:var(--gd);border-color:var(--gb)}
.yr-num{font-family:var(--mono);font-size:15px;font-weight:800;color:var(--g);flex:1}
.yr-info{text-align:right}
.yr-sub{font-size:9px;font-family:var(--mono);font-weight:700}
.yr-type{font-size:8px;color:var(--mut);margin-bottom:1px}
.yr-del{opacity:0;font-size:12px;color:var(--mut);cursor:pointer;padding:2px 4px;
  border-radius:4px;border:none;background:none;transition:.15s}
.yr-item:hover .yr-del{opacity:1}
.yr-del:hover{color:var(--r);background:rgba(248,113,113,.1)}
.add-btn{margin:6px;padding:10px;border-radius:9px;border:1px dashed var(--gb);
  background:none;color:var(--g);font-size:11px;font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:5px;transition:.2s;font-family:'Syne',sans-serif}
.add-btn:hover{background:var(--gd)}
.sb-foot{padding:10px 6px;border-top:1px solid rgba(52,211,153,.07)}
.nav-btn{display:flex;align-items:center;gap:7px;width:100%;padding:8px 10px;
  border-radius:8px;border:none;background:none;color:var(--mut);font-size:11px;
  font-weight:700;cursor:pointer;text-align:left;transition:.15s;font-family:'Syne',sans-serif}
.nav-btn:hover{color:var(--txt);background:rgba(255,255,255,.04)}
.nav-btn.on{color:var(--g);background:var(--gd)}
/* MAIN */
.main{flex:1;overflow:hidden;display:flex;flex-direction:column}
.mh{background:rgba(3,5,10,.9);backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(52,211,153,.1);padding:0 22px;flex-shrink:0}
.mh-top{display:flex;align-items:center;gap:16px;padding:13px 0 0}
.mh-year{font-size:26px;font-weight:900;color:#f1f5f9;font-family:var(--mono)}
.mh-mid{flex:1;min-width:0}
.mh-lbl{font-size:9px;color:var(--mut);letter-spacing:1px;text-transform:uppercase}
.mh-sub{font-size:11px;color:var(--sub);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mh-right{text-align:right;flex-shrink:0}
.mh-rlbl{font-size:9px;color:var(--mut)}
.mh-rval{font-size:20px;font-weight:900;font-family:var(--mono)}
.tabs{display:flex;gap:2px;padding-top:8px;overflow-x:auto}
.tab{padding:8px 14px;border-radius:7px 7px 0 0;border:none;cursor:pointer;
  font-size:11px;font-weight:700;background:transparent;transition:.2s;
  font-family:'Syne',sans-serif;white-space:nowrap;border-bottom:2px solid transparent}
.tab.on{background:rgba(52,211,153,.1);color:var(--g);border-bottom-color:var(--g)}
.tab:not(.on){color:var(--mut)}
.tab:hover:not(.on){color:var(--sub)}
.content{flex:1;overflow-y:auto;padding:20px 22px}
/* CARDS */
.card{background:rgba(15,23,42,.85);border:1px solid rgba(52,211,153,.1);
  border-radius:13px;padding:18px 20px;backdrop-filter:blur(8px)}
.card+.card{margin-top:14px}
.ctitle{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  color:var(--g);margin-bottom:14px;display:flex;align-items:center;gap:6px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
/* INPUTS */
.fld{margin-bottom:14px}
.flbl{font-size:10px;color:var(--sub);margin-bottom:5px;display:block}
.fnote{font-size:10px;color:var(--mut);margin-top:3px;line-height:1.5}
.iw{display:flex;align-items:center;background:var(--bg3);
  border:1px solid var(--gb);border-radius:8px;overflow:hidden}
.iw.warn{border-color:var(--a)}
.ipfx{padding:9px 10px;font-size:11px;color:var(--mut);
  background:rgba(52,211,153,.04);border-right:1px solid rgba(52,211,153,.08)}
.iw input{flex:1;background:transparent;border:none;outline:none;
  color:#f1f5f9;font-size:14px;font-weight:700;font-family:var(--mono);padding:9px 11px}
.iw textarea{flex:1;background:transparent;border:none;outline:none;
  color:var(--sub);font-size:11px;font-family:'Syne',sans-serif;
  padding:9px 11px;resize:none;height:55px;line-height:1.5}
.tog{display:flex;gap:6px}
.tog-btn{flex:1;padding:8px 10px;border-radius:8px;border:1px solid rgba(52,211,153,.1);
  background:var(--bg3);color:var(--mut);font-size:10px;font-weight:700;
  cursor:pointer;transition:.15s;font-family:'Syne',sans-serif}
.tog-btn.on{background:var(--gd);border-color:var(--g);color:var(--g)}
/* TAX ROWS */
.txr{display:flex;justify-content:space-between;align-items:center;
  padding:8px 0;border-bottom:1px solid rgba(52,211,153,.05)}
.txr:last-child{border:none}
.txl{font-size:11px;color:var(--sub)}
.txs{font-size:9px;color:var(--mut);margin-top:1px}
.txv{font-size:12px;font-weight:700;font-family:var(--mono)}
.txr.big .txl{font-size:13px;color:#f1f5f9;font-weight:700}
.txr.big .txv{font-size:16px;font-weight:900}
.cg{color:var(--g)}.cr{color:var(--r)}.ca{color:var(--a)}
.cb{color:var(--b)}.cp{color:var(--p)}.cw{color:#f1f5f9}.cm{color:var(--mut)}
/* ALERTS */
.al{padding:10px 14px;border-radius:10px;font-size:11px;line-height:1.6;margin-bottom:14px}
.al.w{background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.2);color:#fcd34d}
.al.i{background:var(--gd);border:1px solid var(--gb);color:var(--g)}
.al.d{background:rgba(248,113,113,.07);border:1px solid rgba(248,113,113,.2);color:var(--r)}
.al.p{background:rgba(167,139,250,.08);border:1px solid rgba(167,139,250,.2);color:var(--p)}
/* STAT BOXES */
.sb2{background:var(--bg3);border-radius:10px;padding:14px}
.sbl{font-size:9px;color:var(--mut);margin-bottom:5px;letter-spacing:.5px;text-transform:uppercase}
.sbv{font-size:19px;font-weight:900;font-family:var(--mono)}
/* MONTHLY TABLE */
.mtable{width:100%;border-collapse:collapse;font-size:11px}
.mtable th{padding:6px 8px;text-align:right;color:var(--mut);font-size:9px;
  letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid rgba(52,211,153,.08);font-weight:600}
.mtable th:first-child{text-align:left}
.mtable td{padding:5px 6px;text-align:right;border-bottom:1px solid rgba(52,211,153,.04)}
.mtable td:first-child{text-align:left;color:var(--sub);font-weight:600;font-size:10px}
.mtable tr.tot-row td{border-top:1px solid rgba(52,211,153,.15);
  font-weight:800;font-family:var(--mono);color:#f1f5f9;padding-top:8px}
.mtable tr.tot-row td:first-child{color:var(--g)}
.mini-input{background:var(--bg3);border:1px solid rgba(52,211,153,.12);
  border-radius:6px;padding:5px 7px;color:#f1f5f9;font-size:12px;
  font-family:var(--mono);font-weight:700;width:80px;outline:none;text-align:right}
.mini-input:focus{border-color:var(--g)}
/* BAR CHART */
.bar-chart{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.bar-row{display:flex;align-items:center;gap:8px}
.bar-lbl{font-size:10px;color:var(--sub);width:30px;text-align:right;flex-shrink:0}
.bar-track{flex:1;height:16px;background:var(--bg4);border-radius:4px;overflow:hidden;display:flex}
.bar-seg{height:100%;transition:width .4s ease;display:flex;align-items:center;justify-content:center}
.bar-val{font-size:9px;color:var(--sub);width:70px;text-align:right;font-family:var(--mono);flex-shrink:0}
/* THRESHOLD */
.threshold-bar{margin:10px 0;background:var(--bg4);border-radius:6px;height:10px;overflow:hidden;position:relative}
.threshold-fill{height:100%;border-radius:6px;transition:width .5s ease}
.threshold-mark{position:absolute;top:0;bottom:0;width:2px;background:var(--r);right:0}
/* HIST TABLE */
.ht{width:100%;border-collapse:collapse}
.ht th{font-size:9px;color:var(--mut);letter-spacing:1px;text-transform:uppercase;
  padding:7px 12px;text-align:right;font-weight:600;border-bottom:1px solid rgba(52,211,153,.08)}
.ht th:first-child{text-align:left}
.ht td{padding:11px 12px;text-align:right;border-bottom:1px solid rgba(52,211,153,.05);
  font-family:var(--mono);font-size:12px;font-weight:600;color:var(--sub)}
.ht td:first-child{text-align:left;font-family:'Syne',sans-serif;
  font-size:13px;font-weight:800;color:var(--g)}
.ht tr:hover td{background:rgba(52,211,153,.03);cursor:pointer}
/* DEADLINE */
.dl-card{border-radius:11px;padding:14px 16px;margin-bottom:10px}
.dl-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.dl-date{font-size:14px;font-weight:800}
.dl-tot{font-size:21px;font-weight:900;font-family:var(--mono)}
.dl-item{display:flex;justify-content:space-between;align-items:center;
  padding:8px 11px;background:rgba(3,5,10,.45);border-radius:7px;margin-bottom:5px}
.dl-lbl{font-size:11px;color:var(--sub)}
.dl-note{font-size:9px;color:var(--mut)}
.dl-val{font-size:12px;font-weight:700;font-family:var(--mono)}
/* CHAT */
.chat-wrap{display:flex;flex-direction:column;height:480px}
.chat-msgs{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:9px;padding-bottom:10px}
.cbbl{max-width:85%;padding:10px 14px;font-size:12px;line-height:1.65;white-space:pre-wrap}
.cbbl.user{align-self:flex-end;background:rgba(52,211,153,.1);
  border:1px solid rgba(52,211,153,.2);border-radius:13px 13px 3px 13px;color:var(--txt)}
.cbbl.ai{align-self:flex-start;background:rgba(15,23,42,.9);
  border:1px solid rgba(52,211,153,.08);border-radius:13px 13px 13px 3px;color:var(--txt)}
.ai-lbl{font-size:9px;color:var(--g);font-weight:700;letter-spacing:.8px;margin-bottom:4px}
.chat-irow{display:flex;gap:7px;margin-top:8px}
.chat-in{flex:1;padding:10px 14px;border-radius:10px;background:var(--bg3);
  border:1px solid var(--gb);color:#f1f5f9;font-size:12px;outline:none;font-family:'Syne',sans-serif}
.chat-send{padding:10px 15px;border-radius:10px;background:var(--gd);
  border:1px solid var(--gb);color:var(--g);font-size:17px;cursor:pointer}
.chat-send:disabled{opacity:.35;cursor:not-allowed}
.chat-dots{display:flex;gap:3px;padding:10px 14px;align-self:flex-start;
  background:rgba(15,23,42,.9);border:1px solid rgba(52,211,153,.08);border-radius:13px 13px 13px 3px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--g);animation:bou 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
.csug{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.csug-btn{padding:4px 10px;border-radius:16px;border:1px solid var(--gb);
  background:var(--gd);color:var(--g);font-size:10px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:50%;gap:12px;color:var(--mut)}
.empty-i{font-size:44px;opacity:.25}
.apikey-wrap{display:flex;gap:7px;margin-bottom:7px}
.apikey-input{flex:1;padding:9px 13px;border-radius:8px;background:var(--bg3);
  border:1px solid var(--gb);color:#f1f5f9;font-size:12px;outline:none;font-family:var(--mono)}
.eye-btn{padding:9px 12px;border-radius:8px;background:var(--bg4);
  border:1px solid rgba(255,255,255,.06);color:var(--mut);cursor:pointer}
.proroga-toggle{display:flex;align-items:center;gap:8px;padding:8px 12px;
  background:var(--bg3);border-radius:8px;border:1px solid rgba(52,211,153,.1);margin-bottom:10px}
.proroga-check{width:16px;height:16px;cursor:pointer;accent-color:var(--g)}
.savings-box{padding:14px 16px;border-radius:10px;background:rgba(52,211,153,.05);
  border:1px solid var(--gb);margin-top:12px}
.legend-dot{width:10px;height:10px;border-radius:50%;display:inline-block}
@keyframes bou{0%,80%,100%{transform:translateY(0);opacity:.4}40%{transform:translateY(-5px);opacity:1}}
@keyframes fuA{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fuA .2s ease}
@media(max-width:680px){
  .sb{width:170px}.g2,.g3,.g4{grid-template-columns:1fr}.content{padding:14px 12px}}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="app" id="app"></div>
<script>
const COEFF=.78,INPS_RATE=.2607,STORE='cmrcl_v5';
const MESI=['Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic'];
const MESI_F=['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
const COL_STUDIO='#34d399',COL_RB='#a78bfa',COL_ALT='#60a5fa';

function calcT(ricavi,aliq,inpsDedOverride){
  const bi=ricavi*COEFF;                // reddito lordo = base INPS
  const inps=bi*INPS_RATE;              // INPS DOVUTA sull'anno
  const inpsDed=(inpsDedOverride&&inpsDedOverride>0)?inpsDedOverride:inps; // INPS deducibile
  const bf=Math.max(0,bi-inpsDed);      // base imponibile fiscale
  const imp=bf*(aliq/100);              // imposta sostitutiva
  return{ricavi,bi,inps,inpsDed,bf,imp,tot:inps+imp,netto:ricavi-inps-imp};
}

// Calcola INPS effettivamente versata nell'anno (deducibile per imposta)
// = saldo INPS anno precedente (pagato a giu) + acconti INPS anno corrente (pagati giu+nov)
function getInpsDed(year){
  const yr=S.years[year];
  if(!yr) return 0;
  // Override manuale dall'utente (campo inpsEff)
  if(yr.inpsEff>0) return yr.inpsEff;
  // Auto-calcolo: saldo INPS anno-1 + acconti INPS anno corrente
  const prevY=year-1;
  const yrPrev=S.years[prevY];
  if(yrPrev&&getRicavi(yrPrev)>0){
    const inpsPrev=getRicavi(yrPrev)*COEFF*INPS_RATE;
    const saldoPrev=Math.max(0,inpsPrev-(yrPrev.accN||0));
    return saldoPrev+(yr.accN||0);
  }
  return 0; // fallback: calcT userà INPS calcolata
}
const fmt=n=>new Intl.NumberFormat('it-IT',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(n??0);
const fmtD=n=>new Intl.NumberFormat('it-IT',{style:'currency',currency:'EUR',minimumFractionDigits:2,maximumFractionDigits:2}).format(n??0);

function emptyMonthly(){return Array.from({length:12},()=>({studio:0,rb:0,altro:0}));}

const DEFAULTS={apiKey:'',proroga:false,years:{
  2022:{ricavi:4795,aliq:15,accI:0,accN:0,inpsEff:0,note:'RPF 2023: Ricavi €4.795 · INPS dovuta €981 · Imposta €561 · Primo anno, nessun acconto versato.',monthly:null},
  2023:{ricavi:17177,aliq:15,accI:672,accN:785,inpsEff:1767,note:'RPF 2024: Ricavi €17.177 · INPS dovuta €3.514 · INPS versata €1.767 · Imposta €1.745 · Acconti: imp €672 + INPS €785.',monthly:null},
  2024:{ricavi:11174,aliq:15,accI:1000,accN:1000,inpsEff:3729,note:'RPF 2025: Ricavi €11.174 · INPS dovuta €2.272 · INPS versata €3.729 · Imposta €748 · Credito imp €252.',monthly:null},
  2025:{ricavi:12031,aliq:15,accI:554,accN:1722,inpsEff:0,note:'Ricavi €12.031 (96 fatture). Acconti da F24: imp €554 (giu 374+nov 180) · INPS €1.722 (giu 1272+nov 450). INPS versata: auto-calcolata.',monthly:null},
  2026:{ricavi:0,aliq:15,accI:0,accN:0,inpsEff:0,note:'Compila mese per mese nel tab Mensile.',monthly:emptyMonthly()},
  2027:{ricavi:0,aliq:15,accI:0,accN:0,inpsEff:0,note:'Creato automaticamente per catena acconti.',monthly:emptyMonthly()}
}};

function load(){try{const r=localStorage.getItem(STORE);if(r){const d=JSON.parse(r);
  Object.keys(d.years).forEach(y=>{
    if(parseInt(y)>=2026&&!d.years[y].monthly)d.years[y].monthly=emptyMonthly();
    if(d.years[y].inpsEff===undefined) d.years[y].inpsEff=0;
  });
return d;}}catch(e){}return JSON.parse(JSON.stringify(DEFAULTS));}
function save(){try{localStorage.setItem(STORE,JSON.stringify(S));}catch(e){}}

let S=load();
let curY=Math.max(...Object.keys(S.years).map(Number));
let curT='dati';
let msgs=[{r:'ai',t:'Ciao Nicholas! Ho tutti i tuoi dati fiscali dal 2022 al 2025, verificati dalle dichiarazioni RPF. Dal 2026 puoi inserire i ricavi mese per mese nel tab Mensile. Cosa vuoi sapere?'}];
let chatLoading=false,showKey=false;

// RENDER
function R(){document.getElementById('app').innerHTML=buildApp();bindEv();}

function buildApp(){
  const yrs=Object.keys(S.years).map(Number).sort((a,b)=>b-a);
  const yr=S.years[curY];
  const ricavi=yr?getRicavi(yr):0;
  const t=yr?calcT(ricavi,yr.aliq||15,getInpsDed(curY)):null;
  const sI=t?t.imp-(yr.accI||0):0;
  const sN=t?t.inps-(yr.accN||0):0;
  const saldo=sI+sN;
  const hcol=saldo>50?'var(--r)':saldo<-50?'var(--g)':'var(--a)';
  const isGlob=curT==='storico'||curT==='scadenze'||curT==='ai';

  return`<div class="sb">
  <div class="sb-head">
    <div class="logo">
      <div class="logo-icon">⚖️</div>
      <div><div class="logo-t">Commercialista AI</div><div class="logo-s">Nicholas Rossetti · Forfettario</div></div>
    </div>
  </div>
  <div class="yrs-list">
    <div class="yr-lbl">Anni fiscali</div>
    ${yrs.map(y=>{
      const yd=S.years[y];const ri=getRicavi(yd);const ty=calcT(ri,yd.aliq||15,getInpsDed(y));
      const s=ty.imp-(yd.accI||0)+ty.inps-(yd.accN||0);
      const sc=s>50?'cr':s<-50?'cg':'ca';
      const isM=parseInt(y)>=2026;
      return`<div class="yr-item${y===curY?' act':''}" onclick="setY(${y})">
        <div><div class="yr-num">${y}</div>
        <div class="yr-type">${isM?'🗓 Mensile':'📋 Annuale'}</div></div>
        <div class="yr-info">

  <div class="sb-foot">
    <button class="nav-btn${curT==='storico'?' on':''}" onclick="setT('storico')">📊 Storico</button>
    <button class="nav-btn${curT==='scadenze'?' on':''}" onclick="setT('scadenze')">📅 Scadenziario</button>
    <button class="nav-btn${curT==='ai'?' on':''}" onclick="setT('ai')">🤖 Consulente AI</button>
    <div style="border-top:1px solid rgba(52,211,153,.07);margin-top:6px;padding-top:6px">
      <button class="nav-btn" onclick="exportData()" style="font-size:10px">💾 Esporta dati</button>
      <button class="nav-btn" onclick="document.getElementById('imp-file').click()" style="font-size:10px">📂 Importa dati</button>
      <input type="file" id="imp-file" accept=".json" style="display:none" onchange="importData(event)"/>

  </div>
</div>
<div class="main">
  <div class="mh">
    <div class="mh-top">
      <div>
        <div class="mh-lbl">Anno fiscale</div>
        <div class="mh-year">${isGlob?(curT==='storico'?'Storico':curT==='scadenze'?'Scadenziario':'Consulente AI'):curY}</div>
      </div>
      <div class="mh-mid">
        <div class="mh-lbl">ATECO 86.90.29 · Coeff. 78% · INPS 26,07%</div>
        <div class="mh-sub">${yr&&yr.note?yr.note.substring(0,70)+(yr.note.length>70?'…':''):''}</div>
      </div>
      ${!isGlob&&t&&ricavi>0?`<div class="mh-right">
        <div class="mh-rlbl">${curT==='acconti'?'Da pagare nel '+curY:'Saldo giugno '+(curY+1)}</div>
        <div class="mh-rval" style="color:${curT==='acconti'?(()=>{const pY=curY-1;const yP=S.years[pY];if(!yP||!getRicavi(yP))return'var(--mut)';const rP=getRicavi(yP);const tP=calcT(rP,yP.aliq||15,getInpsDed(pY));const tot=(tP.imp-(yP.accI||0))+(tP.inps-(yP.accN||0))+tP.imp*.4+tP.inps*.5+tP.imp*.6+tP.inps*.5;return tot>0?'var(--r)':'var(--g)';})():hcol}">${curT==='acconti'?(()=>{const pY=curY-1;const yP=S.years[pY];if(!yP||!getRicavi(yP))return'—';const rP=getRicavi(yP);const tP=calcT(rP,yP.aliq||15,getInpsDed(pY));const sI2=tP.imp-(yP.accI||0),sN2=tP.inps-(yP.accN||0);const totAnno=(sI2+sN2+tP.imp*.4+tP.inps*.5)+(tP.imp*.6+tP.inps*.5);return fmt(totAnno);})():fmt(Math.abs(saldo))}</div>
      </div>`:''}
    </div>
    ${!isGlob?`<div class="tabs">
      ${[['dati','📋 Dati'],['calcolo','🧮 Calcolo'],['acconti','💳 Acconti'],
         ...(parseInt(curY)>=2026?[['mensile','📆 Mensile']]:[])
        ].map(([id,lb])=>`<div class="tab${curT===id?' on':''}" onclick="setT('${id}')">${lb}</div>`).join('')}
    </div>`:''}
  </div>
  <div class="content">${buildContent()}</div>
</div>`;
}

function getRicavi(yr){
  if(yr.monthly){return yr.monthly.reduce((s,m)=>s+(m.studio||0)+(m.rb||0)+(m.altro||0),0);}
  return yr.ricavi||0;
}

function buildContent(){
  if(curT==='storico') return buildStorico();
  if(curT==='scadenze') return buildScadenze();
  if(curT==='ai') return buildAI();
  const yr=S.years[curY];
  if(!yr) return '<div class="empty"><div class="empty-i">📂</div><div>Seleziona un anno</div></div>';
  if(curT==='dati') return buildDati(yr);
  if(curT==='calcolo') return buildCalcolo(yr);
  if(curT==='acconti') return buildAcconti(yr);
  if(curT==='mensile') return buildMensile(yr);
  return '';
}

          </div>

function buildThreshold(ricavi){
  const pct=Math.min(100,(ricavi/85000)*100);
  const col=pct>85?'var(--r)':pct>65?'var(--a)':'var(--g)';
  return`<div class="card" style="margin-top:14px">
    <div class="ctitle">⚠️ Soglia forfettario</div>
    <div style="display:flex;justify-content:space-between;margin-bottom:6px">
      <span style="font-size:11px;color:var(--sub)">Ricavi ${curY}</span>
      <span style="font-size:12px;font-weight:800;font-family:var(--mono);color:${col}">${fmt(ricavi)} / €85.000</span>
    </div>
    <div class="threshold-bar">
      <div class="threshold-fill" style="width:${pct}%;background:${col}"></div>
    </div>
    <div style="font-size:10px;color:var(--mut);margin-top:5px">
      ${pct>=100?`🚨 SUPERATA — fuoriuscita dal forfettario anno successivo`:
        pct>85?`⚠️ Attenzione: mancano solo ${fmt(85000-ricavi)} alla soglia`:
        `✓ Margine disponibile: ${fmt(85000-ricavi)} (${(100-pct).toFixed(0)}%)`}

  </div>`;
}

// ── CALCOLO ───────────────────────────────────────────────────────────────────
function buildCalcolo(yr){
  const ricavi=getRicavi(yr);

  const sI=t.imp-(yr.accI||0),sN=t.inps-(yr.accN||0);
  const tot=sI+sN;
  const aliqE=ricavi>0?((t.tot/ricavi)*100).toFixed(1):0;
  const showInpsDed=t.inpsDed!==t.inps;
  return`<div class="fu"><div class="g2">
  <div class="card">
    <div class="ctitle">🧮 Tasse reali ${curY}</div>
    <div class="txr"><div><div class="txl">Ricavi ${curY}</div></div><div class="txv cw">${fmt(t.ricavi)}</div></div>
    <div class="txr"><div><div class="txl">Base imponibile INPS (×78%)</div></div><div class="txv cm">${fmt(t.bi)}</div></div>

    <div class="txr big"><div><div class="txl">Totale tasse ${curY}</div></div><div class="txv cr">−${fmt(t.tot)}</div></div>

    <div class="txr big"><div><div class="txl">Saldo imposta</div><div class="txs">${sI>0?'Da pagare':'Credito'}</div></div><div class="txv ${sI>0?'cr':'cg'}">${sI>=0?fmt(sI):'−'+fmt(-sI)}</div></div>
    <div style="height:1px;background:rgba(52,211,153,.06);margin:6px 0"></div>

// ── ACCONTI ───────────────────────────────────────────────────────────────────
// PROSPETTIVA ANNO DI CASSA: Anno X mostra cosa PAGHI nel X (basato su X-1)
function buildAcconti(yr){
  const prevY=curY-1;
  const yrPrev=S.years[prevY];

  // Se non esiste l'anno precedente o non ha ricavi, non possiamo calcolare
  if(!yrPrev||!getRicavi(yrPrev)){
    return`<div class="fu">
    <div class="al w">⚠️ Per vedere le scadenze fiscali del <strong>${curY}</strong> servono i dati del <strong>${prevY}</strong> (anno precedente).<br/>
    ${!yrPrev?`L'anno ${prevY} non esiste ancora.
      <button style="margin-top:6px;padding:6px 12px;border-radius:7px;border:1px solid var(--g);background:var(--gd);color:var(--g);font-weight:700;cursor:pointer;font-family:'Syne',sans-serif" onclick="S.years[${prevY}]={ricavi:0,aliq:15,accI:0,accN:0,inpsEff:0,note:'',monthly:null};save();setY(${prevY});setT('dati')">＋ Crea anno ${prevY}</button>`
      :`Inserisci i ricavi del ${prevY} nel tab Dati.
      <button style="margin-top:6px;padding:6px 12px;border-radius:7px;border:1px solid var(--g);background:var(--gd);color:var(--g);font-weight:700;cursor:pointer;font-family:'Syne',sans-serif" onclick="setY(${prevY});setT('dati')">Vai al ${prevY}</button>`}
    </div></div>`;
  }

  const ricaviPrev=getRicavi(yrPrev);
  const tPrev=calcT(ricaviPrev,yrPrev.aliq||15,getInpsDed(prevY));
  const sI=tPrev.imp-(yrPrev.accI||0); // saldo imposta anno precedente
  const sN=tPrev.inps-(yrPrev.accN||0); // saldo INPS anno precedente

  // acconti anno CORRENTE calcolati su anno precedente (metodo storico)
  const a1i=tPrev.imp*.4,a1n=tPrev.inps*.5,a2i=tPrev.imp*.6,a2n=tPrev.inps*.5;
  const prorMult=S.proroga?1.004:1;
  const totGiu=(sI+sN+a1i+a1n)*prorMult;
  const totNov=a2i+a2n;
  const now=new Date();
  const mesiRim=Math.max(1,(new Date(curY,5,1)-now)/(1000*60*60*24*30));
  const rispMens=totGiu/Math.min(mesiRim,6);
  return`<div class="fu">
  <div class="al d">🚨 <strong>Da pagare ${S.proroga?'Luglio':'Giugno'} ${curY}:</strong> ${fmt(totGiu)}
    &nbsp;·&nbsp; Risparmia <strong>${fmt(rispMens)}/mese</strong> da oggi.</div>
  <div class="al p" style="font-size:10px">ℹ️ Questi importi sono calcolati sui <strong>ricavi ${prevY}</strong> (${fmt(ricaviPrev)}) con metodo storico.
    Il saldo è: tasse reali ${prevY} − acconti versati nel ${prevY}. Gli acconti ${curY} = proiezione su base ${prevY}.</div>
  <div class="proroga-toggle">
    <input type="checkbox" class="proroga-check" id="prt" ${S.proroga?'checked':''} onchange="toggleProroga(this.checked)"/>
    <label for="prt" style="font-size:11px;color:var(--sub);cursor:pointer">
      <strong style="color:${S.proroga?'var(--a)':'var(--mut)'}">Proroga luglio</strong>
      ${S.proroga?'— scadenza 31 luglio con <strong style="color:var(--a)">+0,4% interessi</strong>':'— standard: scadenza 30 giugno'}
    </label>
  </div>
  <div class="g2">
    <div class="card" style="border-color:rgba(248,113,113,.22)">
      <div class="ctitle">💳 ${S.proroga?'Luglio':'Giugno'} ${curY}</div>
      ${[[`Saldo imposta ${prevY}`,sI,'Cod. 1791'],[`Saldo INPS ${prevY}`,sN,'Contributi prev.'],[`1° acconto imposta ${curY} (40%)`,a1i,'Cod. 1790'],[`1° acconto INPS ${curY} (50%)`,a1n,'']].map(([l,v,n])=>`
      <div class="dl-item"><div><div class="dl-lbl">${l}</div><div class="dl-note">${n}</div></div>
        <div class="dl-val ${v>0?'cr':'cg'}">${fmt(Math.abs(v))}</div></div>`).join('')}
      ${S.proroga?`<div style="margin:6px 0 0;font-size:10px;color:var(--a);padding:7px 10px;background:rgba(245,158,11,.07);border-radius:7px">Maggiorazione 0,4%: +${fmt((sI+sN+a1i+a1n)*.004)}</div>`:''}
      <div style="margin-top:10px;padding:11px 13px;border-radius:8px;background:rgba(248,113,113,.07);border:1px solid rgba(248,113,113,.2)">
        <div style="font-size:9px;color:var(--r);font-weight:700;margin-bottom:3px">TOTALE ${S.proroga?'LUGLIO':'GIUGNO'} ${curY}</div>
        <div style="font-size:24px;font-weight:900;color:var(--r);font-family:var(--mono)">${fmt(totGiu)}</div>
      </div>
    </div>
    <div>
      <div class="card" style="border-color:rgba(245,158,11,.18)">
        <div class="ctitle">📋 Novembre ${curY}</div>
        ${[[`2° acconto imposta ${curY} (60%)`,a2i,'Cod. 1790'],[`2° acconto INPS ${curY} (50%)`,a2n,'']].map(([l,v,n])=>`
        <div class="dl-item"><div><div class="dl-lbl">${l}</div><div class="dl-note">${n}</div></div>
          <div class="dl-val ca">${fmt(v)}</div></div>`).join('')}
        <div style="margin-top:10px;padding:11px 13px;border-radius:8px;background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.2)">
          <div style="font-size:9px;color:var(--a);font-weight:700;margin-bottom:3px">TOTALE NOVEMBRE ${curY}</div>
          <div style="font-size:24px;font-weight:900;color:var(--a);font-family:var(--mono)">${fmt(totNov)}</div>
        </div>
      </div>
      <div class="savings-box" style="margin-top:0">
        <div style="font-size:9px;color:var(--g);font-weight:700;letter-spacing:1px;margin-bottom:8px">💰 PIANO RISPARMIO ${curY}</div>
        <div class="g3" style="gap:8px">
          <div><div style="font-size:9px;color:var(--mut)">Giu ${curY}</div><div style="font-size:15px;font-weight:900;color:var(--r);font-family:var(--mono)">${fmt(totGiu)}</div></div>
          <div><div style="font-size:9px;color:var(--mut)">Nov ${curY}</div><div style="font-size:15px;font-weight:900;color:var(--a);font-family:var(--mono)">${fmt(totNov)}</div></div>
          <div><div style="font-size:9px;color:var(--mut)">Tot. anno</div><div style="font-size:15px;font-weight:900;color:cw;font-family:var(--mono)">${fmt(totGiu+totNov)}</div></div>
        </div>
        <div style="margin-top:10px;padding:9px 11px;background:rgba(52,211,153,.07);border-radius:7px">
          <div style="font-size:10px;color:var(--sub)">Da accantonare ogni mese per giugno:</div>
          <div style="font-size:18px;font-weight:900;color:var(--g);font-family:var(--mono)">${fmt(rispMens)}/mese</div>
        </div>
      </div>
    </div>
  </div></div>`;
}

// ── MENSILE (2026+) ───────────────────────────────────────────────────────────
function buildMensile(yr){
  const m=yr.monthly||emptyMonthly();
  const totS=m.reduce((s,x)=>s+(x.studio||0),0);
  const totR=m.reduce((s,x)=>s+(x.rb||0),0);
  const totA=m.reduce((s,x)=>s+(x.altro||0),0);
  const totTot=totS+totR+totA;
  const maxMens=Math.max(...m.map(x=>(x.studio||0)+(x.rb||0)+(x.altro||0)),1);
  const now=new Date();
  const nowM=now.getFullYear()===curY?now.getMonth():-1;

  return`<div class="fu">
  <div class="g2">
    <div>
      <div class="card">
        <div class="ctitle">📆 Ricavi mensili ${curY} per fonte</div>
        <div style="display:flex;align-items:center;gap:14px;margin-bottom:12px;font-size:10px;font-weight:700">
          <span><span class="legend-dot" style="background:${COL_STUDIO}"></span> Studio (SDI)</span>
          <span><span class="legend-dot" style="background:${COL_RB}"></span> 🌹 RoseBerry</span>
          <span><span class="legend-dot" style="background:${COL_ALT}"></span> Altro</span>
        </div>
        <table class="mtable">
          <thead><tr>
            <th style="text-align:left">Mese</th>
            <th>Studio €</th><th>RoseBerry €</th><th>Altro €</th><th>Tot.</th>
          </tr></thead>
          <tbody>
            ${m.map((row,i)=>{
              const tot=(row.studio||0)+(row.rb||0)+(row.altro||0);
              const isNow=i===nowM;const isPast=i<nowM;
              return`<tr style="${isNow?'background:rgba(52,211,153,.04)':''}">
                <td>${MESI[i]}${isNow?' <span style="font-size:8px;color:var(--g)">▶</span>':isPast?' <span style="font-size:8px;color:var(--mut)">✓</span>':''}</td>
                <td><input class="mini-input" type="number" value="${row.studio||0}" onchange="updM(${i},'studio',this.value)" style="border-color:${COL_STUDIO}44"/></td>
                <td><input class="mini-input" type="number" value="${row.rb||0}" onchange="updM(${i},'rb',this.value)" style="border-color:${COL_RB}44"/></td>
                <td><input class="mini-input" type="number" value="${row.altro||0}" onchange="updM(${i},'altro',this.value)" style="border-color:${COL_ALT}44"/></td>
                <td style="font-weight:800;color:${tot>0?'#f1f5f9':'var(--mut)'};">${fmt(tot)}</td>
              </tr>`;
            }).join('')}
          </tbody>
          <tfoot><tr class="tot-row">
            <td>TOTALE</td>
            <td style="color:${COL_STUDIO}">${fmt(totS)}</td>
            <td style="color:${COL_RB}">${fmt(totR)}</td>
            <td style="color:${COL_ALT}">${fmt(totA)}</td>
            <td style="color:var(--g)">${fmt(totTot)}</td>
          </tr></tfoot>
        </table>
      </div>
    </div>
    <div>
      <div class="card">
        <div class="ctitle">📊 Distribuzione per fonte</div>
        <div class="g3" style="margin-bottom:14px">
          <div class="sb2" style="border:1px solid ${COL_STUDIO}33">
            <div class="sbl">Studio SDI</div>
            <div class="sbv" style="color:${COL_STUDIO}">${fmt(totS)}</div>
            <div style="font-size:10px;color:var(--mut);margin-top:3px">${totTot>0?((totS/totTot)*100).toFixed(0):0}%</div>
          </div>
          <div class="sb2" style="border:1px solid ${COL_RB}33">
            <div class="sbl">🌹 RoseBerry</div>
            <div class="sbv" style="color:${COL_RB}">${fmt(totR)}</div>
            <div style="font-size:10px;color:var(--mut);margin-top:3px">${totTot>0?((totR/totTot)*100).toFixed(0):0}%</div>
          </div>
          <div class="sb2" style="border:1px solid ${COL_ALT}33">
            <div class="sbl">Altro</div>
            <div class="sbv" style="color:${COL_ALT}">${fmt(totA)}</div>
            <div style="font-size:10px;color:var(--mut);margin-top:3px">${totTot>0?((totA/totTot)*100).toFixed(0):0}%</div>
          </div>
        </div>
        <div class="ctitle">📈 Andamento mensile</div>
        <div class="bar-chart">
          ${m.map((row,i)=>{
            const s=row.studio||0,r=row.rb||0,a=row.altro||0,tot=s+r+a;
            const ps=maxMens>0?(s/maxMens*100):0;
            const pr=maxMens>0?(r/maxMens*100):0;
            const pa=maxMens>0?(a/maxMens*100):0;
            return`<div class="bar-row">
              <div class="bar-lbl">${MESI[i]}</div>
              <div class="bar-track">
                <div class="bar-seg" style="width:${ps}%;background:${COL_STUDIO}bb"></div>
                <div class="bar-seg" style="width:${pr}%;background:${COL_RB}bb"></div>
                <div class="bar-seg" style="width:${pa}%;background:${COL_ALT}bb"></div>
              </div>
              <div class="bar-val">${tot>0?fmt(tot):''}</div>

        </div>
        ${buildThreshold(totTot)}
      </div>
    </div>
  </div></div>`;
}

// ── STORICO ───────────────────────────────────────────────────────────────────
function buildStorico(){
  const yrs=Object.keys(S.years).map(Number).sort((a,b)=>a-b);
  if(!yrs.length) return'<div class="empty"><div class="empty-i">📊</div><div>Nessun anno</div></div>';
  const maxR=Math.max(...yrs.map(y=>getRicavi(S.years[y])),1);
  return`<div class="fu">
  <div class="card" style="margin-bottom:14px;overflow-x:auto">
    <div class="ctitle">📊 Storico tutti gli anni</div>
    <table class="ht">
      <thead><tr>
        <th>Anno</th><th>Ricavi</th><th>INPS</th><th>Imposta</th>
        <th>Tot. tasse</th><th>Aliq. eff.</th><th>Netto</th><th>Saldo giu+1</th>
      </tr></thead>
      <tbody>
        ${yrs.map(y=>{
          const yd=S.years[y];const ri=getRicavi(yd);
          const t=calcT(ri,yd.aliq||15,getInpsDed(y));
          const s=t.imp-(yd.accI||0)+t.inps-(yd.accN||0);
          const ae=ri>0?((t.tot/ri)*100).toFixed(1)+'%':'—';
          const pct=ri>0?Math.round((ri/maxR)*100):0;
          const sc=s>50?'cr':s<-50?'cg':'ca';
          return`<tr onclick="setY(${y});setT('dati')">
            <td>${y}</td>
            <td><div style="display:flex;align-items:center;gap:7px">
              <div style="width:${pct}px;max-width:60px;height:4px;background:var(--g);border-radius:2px;flex-shrink:0"></div>
              ${ri>0?fmt(ri):`<span style="color:var(--mut)">—</span>`}
            </div></td>
            <td class="cr">${ri>0?fmt(t.inps):'—'}</td>
            <td class="cr">${ri>0?fmt(t.imp):'—'}</td>
            <td class="cr">${ri>0?fmt(t.tot):'—'}</td>
            <td class="ca">${ae}</td>
            <td class="cg">${ri>0?fmt(t.netto):'—'}</td>
            <td class="${sc}">${ri>0?(s>=0?fmt(s):'−'+fmt(-s)):'—'}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  </div>
  <div class="g3">
    ${yrs.map(y=>{
      const yd=S.years[y];const ri=getRicavi(yd);
      const t=calcT(ri,yd.aliq||15,getInpsDed(y));
      const isM=y>=2026;
      if(!ri) return`<div class="card" style="border-style:dashed;opacity:.5;cursor:pointer" onclick="setY(${y});setT('dati')">
        <div style="font-size:10px;color:var(--mut);margin-bottom:4px">ANNO ${y}</div>
        <div style="font-size:13px;color:var(--a);font-weight:700">Da completare</div>
        ${isM?`<div style="font-size:10px;color:var(--mut)">Vai al tab Mensile</div>`:''}
      </div>`;
      const totS=isM?(yd.monthly||[]).reduce((s,m)=>s+(m.studio||0),0):ri;
      const totR=isM?(yd.monthly||[]).reduce((s,m)=>s+(m.rb||0),0):0;
      return`<div class="card" style="cursor:pointer" onclick="setY(${y});setT('calcolo')">
        <div style="font-size:10px;color:var(--mut);margin-bottom:4px">ANNO ${y}</div>
        <div style="font-size:18px;font-weight:900;color:var(--g);font-family:var(--mono);margin-bottom:6px">${fmt(ri)}</div>
        ${isM&&totR>0?`<div style="font-size:10px;color:var(--p);margin-bottom:4px">🌹 RoseBerry: ${fmt(totR)}</div>`:''}
        <div style="font-size:10px;color:var(--mut)">Netto: <strong style="color:var(--g)">${fmt(t.netto)}</strong></div>
        <div style="font-size:10px;color:var(--mut)">Tasse: <strong style="color:var(--r)">${fmt(t.tot)}</strong></div>
      </div>`;
    }).join('')}
  </div></div>`;
}

// ── SCADENZIARIO ──────────────────────────────────────────────────────────────
function buildScadenze(){
  const yrs=Object.keys(S.years).map(Number).sort((a,b)=>a-b);
  const deadlines=[];
  yrs.forEach(y=>{
    const yd=S.years[y];const ri=getRicavi(yd);if(!ri) return;
    const t=calcT(ri,yd.aliq||15,getInpsDed(y));
    const sI=t.imp-(yd.accI||0),sN=t.inps-(yd.accN||0);
    const a1i=t.imp*.4,a1n=t.inps*.5,a2i=t.imp*.6,a2n=t.inps*.5;
    const pm=S.proroga?1.004:1;
    deadlines.push({
      date:`${S.proroga?'Luglio':'Giugno'} ${y+1}`,y:y+1,m:S.proroga?7:6,
      items:[
        {l:`Saldo imposta ${y}`,v:sI,n:'Cod. 1791'},
        {l:`Saldo INPS ${y}`,v:sN,n:''},
        {l:`1° acc. imposta ${y+1} (40%)`,v:a1i,n:'Cod. 1790'},
        {l:`1° acc. INPS ${y+1} (50%)`,v:a1n,n:''},
      ],
      tot:(sI+sN+a1i+a1n)*pm,col:'var(--r)',bg:'rgba(248,113,113,.06)',bd:'rgba(248,113,113,.22)'
    });
    deadlines.push({
      date:`Novembre ${y+1}`,y:y+1,m:11,
      items:[{l:`2° acc. imposta ${y+1} (60%)`,v:a2i,n:'Cod. 1790'},{l:`2° acc. INPS ${y+1} (50%)`,v:a2n,n:''}],
      tot:a2i+a2n,col:'var(--a)',bg:'rgba(245,158,11,.06)',bd:'rgba(245,158,11,.2)'
    });
  });
  const seen=new Set();
  const uniq=deadlines.filter(d=>{const k=`${d.y}-${d.m}`;if(seen.has(k))return false;seen.add(k);return true;})
    .sort((a,b)=>a.y*100+a.m-(b.y*100+b.m));
  const now=new Date();const nowK=now.getFullYear()*100+now.getMonth()+1;
  return`<div class="fu">
  <div class="proroga-toggle" style="margin-bottom:14px">
    <input type="checkbox" class="proroga-check" id="prt2" ${S.proroga?'checked':''} onchange="toggleProroga(this.checked)"/>
    <label for="prt2" style="font-size:11px;color:var(--sub);cursor:pointer">
      Usa <strong>proroga luglio</strong> (+0,4% interessi) invece di giugno
    </label>
  </div>
  ${uniq.map(d=>{
    const past=d.y*100+d.m<nowK;
    return`<div class="dl-card" style="background:${d.bg};border:1px solid ${d.bd};${past?'opacity:.45':''}">
      <div class="dl-head">
        <div>
          <div class="dl-date" style="color:${d.col}">${d.date}${past?' <span style="font-size:9px;color:var(--mut)">passato</span>':''}</div>
          <div style="font-size:10px;color:var(--mut)">Scadenza 30 ${d.m===6||d.m===7?(d.m===7?'luglio':'giugno'):'novembre'}</div>
        </div>
        <div class="dl-tot" style="color:${d.col}">${fmt(d.tot)}</div>
      </div>
      ${d.items.map(i=>`<div class="dl-item">
        <div><div class="dl-lbl">${i.l}</div><div class="dl-note">${i.n}</div></div>
        <div class="dl-val" style="color:${i.v>0?d.col:'var(--g)'}">${fmt(Math.abs(i.v))}</div>
      </div>`).join('')}
    </div>`;
  }).join('')}
  ${!uniq.length?`<div class="empty"><div class="empty-i">📅</div><div>Inserisci ricavi negli anni</div></div>`:''}
  </div>`;
}

// ── AI ────────────────────────────────────────────────────────────────────────
function buildAI(){
  const ctx=Object.keys(S.years).map(Number).sort((a,b)=>a-b).map(y=>{
    const yd=S.years[y];const ri=getRicavi(yd);
    const t=calcT(ri,yd.aliq||15,getInpsDed(y));
    const sI=t.imp-(yd.accI||0),sN=t.inps-(yd.accN||0);
    let extra='';
    if(y>=2026&&yd.monthly){
      const totS=yd.monthly.reduce((s,m)=>s+(m.studio||0),0);
      const totR=yd.monthly.reduce((s,m)=>s+(m.rb||0),0);
      const totA=yd.monthly.reduce((s,m)=>s+(m.altro||0),0);
      extra=` | Studio SDI: ${fmtD(totS)} | RoseBerry: ${fmtD(totR)} | Altro: ${fmtD(totA)}`;
    }
    return`ANNO ${y}: Ricavi ${fmtD(ri)} | INPSdovuta ${fmtD(t.inps)} | INPSdeducibile ${fmtD(t.inpsDed)} | Imposta ${yd.aliq||15}% = ${fmtD(t.imp)} | AccI ${fmtD(yd.accI||0)} | AccN ${fmtD(yd.accN||0)} | SaldoImp ${fmtD(sI)} | SaldoINPS ${fmtD(sN)}${extra}`;
  }).join('\n');
  return`<div class="fu">
  <div class="card" style="margin-bottom:14px">
    <div class="ctitle">🔑 Chiave API Anthropic</div>
    <div class="apikey-wrap">
      <input class="apikey-input" type="${showKey?'text':'password'}" value="${S.apiKey||''}" placeholder="sk-ant-..." oninput="updAK(this.value)"/>
      <button class="eye-btn" onclick="togKey()">${showKey?'🙈':'👁️'}</button>
    </div>
    <div style="font-size:10px;color:var(--mut)">
      <a href="https://console.anthropic.com/settings/keys" target="_blank" style="color:var(--g)">console.anthropic.com</a>
      &nbsp;·&nbsp; Salvata localmente &nbsp;·&nbsp; Pochi centesimi a conversazione
    </div>
  </div>
  <div class="card">
    <div class="ctitle">🤖 Consulente Fiscale AI</div>
    <div style="font-size:10px;color:var(--mut);padding:8px 11px;border-radius:8px;background:var(--gd);border:1px solid var(--gb);margin-bottom:12px">
      Conosce tutti i tuoi anni (${Object.keys(S.years).join(', ')}), acconti versati, saldi, e dal 2026 il dettaglio per fonte.
    </div>
    <div class="chat-wrap">
      <div class="chat-msgs" id="cmsg">
        ${msgs.map(m=>`<div class="cbbl ${m.r}">
          ${m.r==='ai'?'<div class="ai-lbl">⚖️ CONSULENTE FISCALE AI</div>':''}${m.t}</div>`).join('')}
        ${chatLoading?`<div class="chat-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`:''}
      </div>
      ${msgs.length===1?`<div class="csug">
        ${['Quanto pago a giugno prossimo?','Confronta 2024 vs 2025','Conviene il metodo previsionale?','Cosa succede se RoseBerry supera €10.000?','Come riduco gli acconti?'].map(s=>
          `<button class="csug-btn" onclick="setSug('${s}')">${s}</button>`).join('')}
      </div>`:''}
      <div class="chat-irow">
        <input class="chat-in" id="cin" placeholder="Chiedi al consulente..." onkeydown="if(event.key==='Enter')sendChat()"/>
        <button class="chat-send" id="csend" onclick="sendChat()" ${chatLoading?'disabled':''}>→</button>
      </div>
    </div>
  </div></div>`;
}

// ── EVENTI ────────────────────────────────────────────────────────────────────
function bindEv(){const c=document.getElementById('cmsg');if(c)c.scrollTop=c.scrollHeight;}
function setY(y){curY=y;curT='dati';R();}
function setT(t){
  if(['storico','scadenze','ai'].includes(t)) curY=Math.max(...Object.keys(S.years).map(Number));
  // auto-switch mensile for 2026+
  if(t==='mensile'&&parseInt(curY)<2026) return;
  curT=t;R();
}
function updF(f,v){
  if(!S.years[curY]) S.years[curY]={};
  S.years[curY][f]=f==='note'?v:Number(v);
  save();R();
}
function updM(i,f,v){
  if(!S.years[curY]) return;
  if(!S.years[curY].monthly) S.years[curY].monthly=emptyMonthly();
  S.years[curY].monthly[i][f]=Number(v);
  S.years[curY].ricavi=getRicavi(S.years[curY]);
  save();R();
}
function updAK(v){S.apiKey=v.trim();save();}
function togKey(){showKey=!showKey;R();}
function toggleProroga(v){S.proroga=v;save();R();}
function setSug(t){const el=document.getElementById('cin');if(el)el.value=t;}
function addY(){
  const yrs=Object.keys(S.years).map(Number);
  const newY=Math.max(...yrs)+1;
  S.years[newY]={ricavi:0,aliq:15,accI:0,accN:0,inpsEff:0,note:'',monthly:newY>=2026?emptyMonthly():null};
  // Auto-crea anno successivo (vuoto) per la catena acconti
  const nextY=newY+1;
  if(!S.years[nextY]){
    S.years[nextY]={ricavi:0,aliq:15,accI:0,accN:0,inpsEff:0,note:'Creato automaticamente — da compilare.',monthly:nextY>=2026?emptyMonthly():null};
  }
  save();curY=newY;curT=newY>=2026?'mensile':'dati';R();
}
function delY(e,y){
  e.stopPropagation();
  if(!confirm(`Eliminare l'anno ${y}?`)) return;
  delete S.years[y];save();
  const yrs=Object.keys(S.years).map(Number);
  curY=yrs.length?Math.max(...yrs):null;R();
}

function exportData(){
  const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`commercialista_backup_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importData(e){
  const file=e.target.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const data=JSON.parse(ev.target.result);
      if(!data.years||typeof data.years!=='object'){alert('File non valido: manca la sezione "years".');return;}
      if(!confirm(`Importare dati con anni: ${Object.keys(data.years).join(', ')}?\nI dati attuali verranno sostituiti.`)) return;
      // Migra monthly per anni >=2026
      Object.keys(data.years).forEach(y=>{if(parseInt(y)>=2026&&!data.years[y].monthly)data.years[y].monthly=emptyMonthly();});
      // Auto-crea anno successivo se manca
      const maxY=Math.max(...Object.keys(data.years).map(Number));
      if(!data.years[maxY+1]) data.years[maxY+1]={ricavi:0,aliq:15,accI:0,accN:0,inpsEff:0,note:'Creato automaticamente.',monthly:(maxY+1)>=2026?emptyMonthly():null};
      S=data;save();
      curY=Math.max(...Object.keys(S.years).map(Number));
      curT='dati';R();
      alert('✅ Dati importati con successo!');
    }catch(err){alert('Errore nel file: '+err.message);}
  };
  reader.readAsText(file);
  e.target.value=''; // reset per permettere reimport stesso file
}

async function sendChat(){
  const inp=document.getElementById('cin');
  const txt=inp?.value?.trim();
  if(!txt||chatLoading) return;
  if(!S.apiKey || !S.apiKey.trim()){
    msgs.push({r:'ai',t:'⚠️ Inserisci la chiave API Anthropic per usare il consulente.'});
    R();return;
  }
  inp.value='';
  msgs.push({r:'user',t:txt});
  chatLoading=true;R();

  const ctx=Object.keys(S.years).map(Number).sort((a,b)=>a-b).map(y=>{
    const yd=S.years[y];const ri=getRicavi(yd);
    const t=calcT(ri,yd.aliq||15,getInpsDed(y));
    const sI=t.imp-(yd.accI||0),sN=t.inps-(yd.accN||0);
    let extra='';
    if(y>=2026&&yd.monthly){
      const totS=yd.monthly.reduce((s,m)=>s+(m.studio||0),0);
      const totR=yd.monthly.reduce((s,m)=>s+(m.rb||0),0);
      extra=` | Studio: ${fmtD(totS)} | RoseBerry: ${fmtD(totR)}`;
    }
    return`ANNO ${y}: Ricavi ${fmtD(ri)} | INPSdovuta ${fmtD(t.inps)} | INPSdeducibile ${fmtD(t.inpsDed)} | Imposta ${fmtD(t.imp)} | Saldo: ${fmtD(sI+sN)}${extra}`;
  }).join('\n');

  const sys=`Sei un commercialista italiano esperto in regime forfettario. Rispondi SEMPRE in italiano, diretto e preciso.
CLIENTE: Nicholas Rossetti — Osteopata, ATECO 86.90.29, Forfettario, INPS Gest.Sep. 26,07%, Coeff. 78%.
DATI FISCALI:\n${ctx}
REGOLE: Base imponibile = ricavi×78% − INPS effettivamente versata nell'anno. Acconto 40% giu + 60% nov (metodo storico). INPS 50%+50%. Saldo = tasse reali - acconti versati. Limite 85k€. Nessuna IVA.
Rispondi: 1) Risposta diretta 2) Importo preciso 3) Cosa fare. Conciso.`;

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':S.apiKey,
        'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:900,system:sys,
        messages:msgs.filter((_,i)=>i>0).map(m=>({role:m.r==='ai'?'assistant':'user',content:m.t}))})});
    const d=await res.json();
    msgs.push({r:'ai',t:d.content?.find(b=>b.type==='text')?.text||'Errore.'});
  }catch(e){msgs.push({r:'ai',t:'Errore: '+e.message});}
  chatLoading=false;R();
}

window.addEventListener('DOMContentLoaded',()=>R());
</script>
